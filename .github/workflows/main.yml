name: Require Tag on PR

on:
  pull_request:
    branches:
      - main

jobs:
  check-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Check tag on PR commit
        run: |
          PR_SHA=${{ github.event.pull_request.head.sha }}

          TAG=$(git tag --points-at $PR_SHA)

          if [ -z "$TAG" ]; then
            echo "❌ No tag found on this commit"
            exit 1
          else
            echo "✅ Tag found: $TAG"
          fi