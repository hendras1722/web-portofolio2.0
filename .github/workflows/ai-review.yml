name: AI Review Pull Request

on:
  pull_request:
    branches:
      - master # Sesuaikan dengan branch utama kamu

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wajib 0 agar history git terbaca untuk diff

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun add @google/genai

      - name: Run AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Pakai bun run, tidak perlu --env-file karena secret sudah di-inject lewat env
        run: bun .github/scripts/ai-review.mjs